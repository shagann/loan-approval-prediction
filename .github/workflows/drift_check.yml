name: Drift Check and Retrain

"on":
  workflow_dispatch:
    inputs:
      force_drift:
        description: "Force drift for demo?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "0 9 * * *"

# This permission allows the workflow to commit a new candidate model package back to the repository.
permissions:
  contents: write

jobs:
  drift-check:
    runs-on: ubuntu-latest

    # This output is used by the retrain job to decide whether retraining should run.
    outputs:
      drift_detected: ${{ steps.check_drift.outputs.drift_detected }}

    steps:
      # Choose the normal drift endpoint or the forced demo endpoint.
      - name: Choose drift check URL
        id: drift_url
        run: |
          if [ "${{ github.event.inputs.force_drift }}" = "true" ]; then
            echo "url=http://${{ secrets.VM_HOST }}/drift-check?force=true" >> $GITHUB_OUTPUT
          else
            echo "url=http://${{ secrets.VM_HOST }}/drift-check" >> $GITHUB_OUTPUT
          fi

      # Call the deployed app drift endpoint and save the JSON result.
      - name: Run drift check
        id: check_drift
        run: |
          echo "Running drift check..."
          echo "URL: ${{ steps.drift_url.outputs.url }}"

          curl -f "${{ steps.drift_url.outputs.url }}" -o drift_result.json

          echo "Drift result:"
          cat drift_result.json

          DRIFT_DETECTED=$(python -c "import json; print(str(json.load(open('drift_result.json')).get('drift_detected', False)).lower())")

          echo "drift_detected=$DRIFT_DETECTED" >> $GITHUB_OUTPUT
          echo "Drift detected: $DRIFT_DETECTED"

  retrain:
    runs-on: ubuntu-latest
    needs: drift-check

    # Only run retraining when the drift-check job found drift.
    if: needs.drift-check.outputs.drift_detected == 'true'

    steps:
      # Checkout the repository so the retraining script can access data and model artefacts.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PUSH_TOKEN }}
          fetch-depth: 0

      # Use Python 3.9 to match the Docker/app environment.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # Install the dependencies needed by the retraining script.
      - name: Install retraining dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn joblib

      # Run the retraining script. This creates retraining metrics and a candidate model package.
      - name: Run retraining script
        run: |
          echo "Drift detected. Starting retraining..."
          python training/retrain_model.py

      # Commit the new candidate model package and retraining metrics back to Git.
      - name: Commit candidate model package
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add models/model-v2-candidate training/retraining_metrics.json

          if git diff --cached --quiet; then
            echo "No retraining artefacts to commit."
          else
            git commit -m "Add candidate model package from retraining workflow"
            git remote set-url origin "https://x-access-token:${{ secrets.ACTIONS_PUSH_TOKEN }}@github.com/${{ github.repository }}.git"
            git push origin HEAD:main
          fi

      # Upload the retraining metrics as a visible GitHub Actions artifact.
      - name: Upload retraining metrics
        uses: actions/upload-artifact@v4
        with:
          name: retraining-metrics
          path: training/retraining_metrics.json