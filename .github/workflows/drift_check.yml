name: Drift Check and Retrain

run-name: Drift check, retrain, and auto-promote by ${{ github.actor }}

# Checks drift, retrains if needed, and promotes the candidate if the evaluation gate approves it.

"on":
  workflow_dispatch:
    inputs:
      force_drift:
        description: "Force drift for demo?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  drift-check:
    runs-on: ubuntu-latest

    outputs:
      drift_detected: ${{ steps.check_drift.outputs.drift_detected }}

    steps:
      # Use forced drift only for demos/tests.
      - name: Choose drift check URL
        id: drift_url
        run: |
          if [ "${{ github.event.inputs.force_drift }}" = "true" ]; then
            echo "url=http://${{ secrets.VM_HOST }}/drift-check?force=true" >> $GITHUB_OUTPUT
          else
            echo "url=http://${{ secrets.VM_HOST }}/drift-check" >> $GITHUB_OUTPUT
          fi

      # Call the deployed drift endpoint and extract drift_detected.
      - name: Run drift check
        id: check_drift
        run: |
          echo "Running drift check..."
          echo "URL: ${{ steps.drift_url.outputs.url }}"

          curl -f "${{ steps.drift_url.outputs.url }}" -o drift_result.json

          echo "Drift result:"
          cat drift_result.json

          DRIFT_DETECTED=$(python -c "import json; print(str(json.load(open('drift_result.json')).get('drift_detected', False)).lower())")

          echo "drift_detected=$DRIFT_DETECTED" >> $GITHUB_OUTPUT
          echo "Drift detected: $DRIFT_DETECTED"

  retrain:
    runs-on: ubuntu-latest
    needs: drift-check

    if: needs.drift-check.outputs.drift_detected == 'true'

    steps:
      # Checkout with push token so this job can commit model artefacts.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PUSH_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install retraining dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn joblib

      # Creates/updates models/model-v2-candidate and writes retraining_metrics.json.
      - name: Run retraining script
        run: |
          echo "Drift detected. Starting retraining..."
          python training/retrain_model.py

      # If the evaluation gate approves, switch deployment to model-v2-candidate.
      - name: Auto-promote approved candidate model
        run: |
          PROMOTION_DECISION=$(python -c "import json; print(json.load(open('training/retraining_metrics.json')).get('promotion_decision', 'rejected'))")

          echo "Promotion decision: $PROMOTION_DECISION"

          if [ "$PROMOTION_DECISION" = "approved" ]; then
            echo "Candidate approved. Promoting model-v2-candidate..."

            sed -i 's/^MODEL_VERSION=.*/MODEL_VERSION="model-v2-candidate"/' deployment/deploy.sh

            echo "MODEL_VERSION after promotion:"
            grep "MODEL_VERSION" deployment/deploy.sh
          else
            echo "Candidate not approved. Keeping current production model."
          fi

      # Commit candidate artefacts and any MODEL_VERSION promotion in one commit.
      - name: Commit retraining and promotion changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add models/model-v2-candidate training/retraining_metrics.json deployment/deploy.sh

          if git diff --cached --quiet; then
            echo "No retraining or promotion artefacts to commit."
          else
            PROMOTION_DECISION=$(python -c "import json; print(json.load(open('training/retraining_metrics.json')).get('promotion_decision', 'rejected'))")

            if [ "$PROMOTION_DECISION" = "approved" ]; then
              git commit -m "Retrain: approve and promote model-v2-candidate after evaluation gate"
            else
              git commit -m "Retrain: update model-v2-candidate package after drift detection"
            fi

            git remote set-url origin "https://x-access-token:${{ secrets.ACTIONS_PUSH_TOKEN }}@github.com/${{ github.repository }}.git"

            git push origin HEAD:main
          fi

      - name: Upload retraining metrics
        uses: actions/upload-artifact@v4
        with:
          name: retraining-metrics
          path: training/retraining_metrics.json