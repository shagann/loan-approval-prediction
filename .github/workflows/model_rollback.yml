name: Model Package Rollback

run-name: Rollback ${{ github.event.inputs.model_package_path }} to ${{ github.event.inputs.source_commit }}

# Model Governance / Rollback workflow.
#
# This workflow restores a selected model package folder from a chosen Git commit.
# It does not roll back the whole application.
#
# Example:
# source_commit = 195c6f9
# model_package_path = models/model-v2-candidate
#
# If the restore changes files, the workflow commits the rollback back to main.
# The push to main then triggers the normal deployment workflow.
#
# This workflow does not directly trigger deploy.yml.
# Deployment happens once through the normal push-to-main deployment path.

"on":
  workflow_dispatch:
    inputs:
      source_commit:
        description: "Commit SHA to restore the model package from"
        required: true
        type: string
      model_package_path:
        description: "Model package folder to roll back"
        required: true
        default: "models/model-v2-candidate"
        type: string

# Allow this workflow to commit rollback changes back to the repository.
permissions:
  contents: write

jobs:
  rollback-model-package:
    runs-on: ubuntu-latest

    steps:
      # Checkout the current main branch using the push token.
      - name: Checkout current main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_PUSH_TOKEN }}

      # Print the selected rollback details so the reason for the run is visible.
      - name: Show rollback details
        run: |
          echo "Rolling back model package..."
          echo "Source commit: ${{ github.event.inputs.source_commit }}"
          echo "Model package path: ${{ github.event.inputs.model_package_path }}"

      # Restore only the selected model package folder from the chosen commit.
      # This avoids reverting unrelated app code.
      - name: Restore model package from selected commit
        run: |
          git checkout ${{ github.event.inputs.source_commit }} -- ${{ github.event.inputs.model_package_path }}

      # Show what changed before committing.
      - name: Show changed files
        run: |
          git status
          git diff --stat

      # Commit the restored model package and push it back to main.
      # The resulting push to main triggers the normal deployment workflow.
      - name: Commit model package rollback
        id: commit_rollback
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add ${{ github.event.inputs.model_package_path }}

          if git diff --cached --quiet; then
            echo "No model package changes to commit."
            echo "rollback_committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Rollback: restore ${{ github.event.inputs.model_package_path }} to ${{ github.event.inputs.source_commit }}"

            git remote set-url origin "https://x-access-token:${{ secrets.ACTIONS_PUSH_TOKEN }}@github.com/${{ github.repository }}.git"

            git push origin HEAD:main
            echo "rollback_committed=true" >> $GITHUB_OUTPUT
          fi

      # Print a clear final message for the demo log.
      - name: Summarise rollback result
        run: |
          if [ "${{ steps.commit_rollback.outputs.rollback_committed }}" = "true" ]; then
            echo "Rollback commit was created and pushed to main."
            echo "The normal deployment workflow should now run from the push to main."
          else
            echo "No rollback commit was needed because the model package already matched the selected commit."
            echo "No deployment will be triggered because there was no new commit."
          fi